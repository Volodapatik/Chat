name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Create assets folder
        run: mkdir -p app/src/main/assets

      - name: Create placeholder API key file
        run: |
          echo "# Place your DeepSeek API key here" > app/src/main/assets/api_key.txt
          echo "# You can replace this file or set DEEPSEEK_API_KEY secret" >> app/src/main/assets/api_key.txt

      - name: Inject API key from secrets (if available)
        if: env.DEEPSEEK_API_KEY != ''
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: echo "$DEEPSEEK_API_KEY" > app/src/main/assets/api_key.txt

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: floating-deepseek-ai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
